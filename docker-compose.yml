services:
  display-portal:
    build:
      context: .
      dockerfile: services/display-portal/Dockerfile
    ports:
      - "8888:8888"
    environment:
      DISPLAY_PUBLIC_HOST: localhost
      ENTITY_UI_PROBE_URL: http://entity-display-web:8080
      ENTITY_API_PROBE_URL: http://entity-display-api:8003
      BATTLESPACE_UI_PROBE_URL: http://battlespace-display-web:8081
      BATTLESPACE_API_PROBE_URL: http://battlespace-display-api:8004
      RF_UI_PROBE_URL: http://rf-display-web:8082
      RF_API_PROBE_URL: http://rf-display-api:8005
      PROMETHEUS_PROBE_URL: http://host.docker.internal:9090
      GRAFANA_PROBE_URL: http://host.docker.internal:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - entity-display-api
      - entity-display-web
      - battlespace-display-api
      - battlespace-display-web
      - rf-display-api
      - rf-display-web

  entity-display-api:
    build:
      context: .
      dockerfile: services/entity-display/api/Dockerfile
    ports:
      - "8003:8003"
    environment:
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379/0}
      COMMLINK_DIRECTORY_XML: /app/fixtures/commlink-directory-v1.1.xml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  entity-display-web:
    build:
      context: .
      dockerfile: services/entity-display/web/Dockerfile
      args:
        VITE_API_URL: http://entity-display-api:8003
    ports:
      - "8080:8080"
    depends_on:
      - entity-display-api

  battlespace-display-api:
    build:
      context: .
      dockerfile: services/battlespace-display/api/Dockerfile
    ports:
      - "8004:8004"
    environment:
      ADVISOR_EMBEDDED: "0"
      REDIS_URL: memory://

  battlespace-display-web:
    build:
      context: .
      dockerfile: services/battlespace-display/web/Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - battlespace-display-api

  rf-display-api:
    build:
      context: .
      dockerfile: services/rf-display/api/Dockerfile
    ports:
      - "8005:8005"
    environment:
      REDIS_URL: memory://
      COMMLINK_DIRECTORY_XML: /app/fixtures/commlink-directory-v1.1.xml

  rf-display-web:
    build:
      context: .
      dockerfile: services/rf-display/web/Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      - rf-display-api
