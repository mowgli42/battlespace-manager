name: Vercel deploy

# Optional: deploys when Vercel + private-repo secrets are configured.
# Without secrets the job succeeds with a skip message (does not fail CI).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        id: secrets
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && [ -n "${{ secrets.VERCEL_ORG_ID }}" ] && [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ] && { [ -n "${{ secrets.GITHUB_TOKEN_PRIVATE }}" ] || [ -n "${{ secrets.PRIVATE_REPO_TOKEN }}" ]; }; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Vercel deploy — set VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID, and GITHUB_TOKEN_PRIVATE (or PRIVATE_REPO_TOKEN)."
          fi

      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.ready == 'true'
        with:
          node-version: "20"

      - name: Install Vercel CLI
        if: steps.secrets.outputs.ready == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel env
        if: steps.secrets.outputs.ready == 'true'
        run: |
          vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        if: steps.secrets.outputs.ready == 'true'
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN_PRIVATE || secrets.PRIVATE_REPO_TOKEN }}
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN || secrets.GITHUB_TOKEN_PRIVATE }}

      - name: Deploy
        if: steps.secrets.outputs.ready == 'true'
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
          else
            vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}"
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
